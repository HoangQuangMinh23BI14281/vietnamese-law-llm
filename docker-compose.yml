services:
  # 1. Weaviate (Dùng Named Volume cho Database)
  weaviate:
    image: semitechnologies/weaviate:1.24.1
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8080'
      - --scheme
      - http
    # ports:
    #   - "8080:8080" # Đóng cổng này nếu không cần debug trực tiếp từ trình duyệt
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - rag-net

  # 2. Embedding API (Dùng Bind Mount cho Models)
  embedding-api:
    build:
      context: ./services/embedding-api
    # ports: - "5000:5000" # Đóng cổng để bảo mật, chỉ nội bộ gọi nhau
    volumes:
      - ./models:/app/models # BIND MOUNT: Model nằm trên máy bạn
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    networks:
      - rag-net

  # 3. Indexing Service
  indexing-service:
    build:
      context: ./services/indexing-service
    environment:
      EMBEDDING_API_URL: "http://embedding-api:5000/embed"
      WEAVIATE_URL: "http://weaviate:8080"
    depends_on:
      - weaviate
      - embedding-api
    networks:
      - rag-net

  # 4. LLM Gateway
  llm-gateway:
    build:
      context: ./services/llm-gateway
    ports:
      - "8001:8001" # Mở cổng để bạn có thể test API bằng Postman
    volumes:
      - ./models:/app/models
    environment:
      WEAVIATE_URL: "http://weaviate:8080"
      EMBEDDING_API_URL: "http://embedding-api:5000/embed"
    depends_on:
      - weaviate
      - embedding-api
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    networks:
      - rag-net

  # 5. Frontend
  frontend:
    build:
      context: ./services/frontend
    ports:
      - "8501:8501"
    environment:
      LLM_GATEWAY_URL: "http://llm-gateway:8001"
      INDEXING_SERVICE_URL: "http://indexing-service:5001"
    depends_on:
      - llm-gateway
      - indexing-service
    networks:
      - rag-net

networks:
  rag-net:
    driver: bridge

volumes:
  weaviate_data:
